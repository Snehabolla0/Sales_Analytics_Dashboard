<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #141e30, #243b55);
        }

        .auth-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .auth-box {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(12px);
            padding: 40px;
            width: 350px;
            border-radius: 15px;
            color: #fff;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            text-align: center;
        }

        .auth-box h2 {
            margin-bottom: 20px;
            color: #ff9ff3;
        }

        .auth-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            outline: none;
            background: #1e2a38;
            color: white;
        }

        .auth-box input::placeholder {
            color: #aaa;
        }

        .auth-box button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #ff6ec4, #7873f5);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .auth-box button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #ff6ec4;
        }

        .auth-box a {
            color: #00d2ff;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="auth-wrapper">
    <div class="auth-box">

        <h2>🔐 Welcome Back</h2>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div style="background:#e74c3c; padding:10px; border-radius:8px;">
              {% for message in messages %}
                <p>{{ message }}</p>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="text" name="username" placeholder="👤 Username" required>
            <input type="password" name="password" placeholder="🔒 Password" required>
            <button type="submit">Login</button>
        </form>

        <p>New here? <a href="/register">Create Account</a></p>

    </div>
</div>

</body>
</html>
